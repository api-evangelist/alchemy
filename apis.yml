description: >-
  Alchemy is a Web3 developer platform providing powerful APIs, SDKs, and
  infrastructure tools to build and scale blockchain applications. Supporting
  Ethereum, Polygon, and other EVM-compatible networks, Alchemy powers
  production dApps with reliable node infrastructure, enhanced APIs for token
  data, asset transfers, NFTs, and ERC-4337 Account Abstraction tools including
  gas sponsorship (Gas Manager) and smart account bundling.
