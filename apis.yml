  - aid: alchemy:alchemy-bundler-api
    name: Alchemy Bundler API
    tags:
      - Bundler
      - Account Abstraction
      - ERC-4337
    humanURL: https://www.alchemy.com/bundler
    description: >-
      The Alchemy Bundler API implements the ERC-4337 Account Abstraction
      bundler standard, allowing UserOperations to be submitted to the
      blockchain. Developers can send, estimate, and track UserOperations
      using standard eth_sendUserOperation and related methods.
    properties: []

