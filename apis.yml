  - aid: alchemy:alchemy-gas-manager-api
    name: Alchemy Gas Manager API
    tags:
      - Gas Manager
      - Account Abstraction
      - ERC-4337
    humanURL: https://www.alchemy.com/gas-manager
    description: >-
      The Alchemy Gas Manager API enables developers to sponsor gas fees for
      end users via the ERC-4337 Account Abstraction standard. Manage
      sponsorship policies with per-user spend limits, total caps, allowlisted
      contracts, and time-based expiry, enabling gasless transactions for dApp
      users.
