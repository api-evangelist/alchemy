naftiko: 1.0.0-alpha2
info:
  label: Alchemy Transfers API — Transfers
  description: 'Alchemy Transfers API — Transfers. 1 operations. Lead operation: Alchemy Get Asset Transfers. Self-contained
    Naftiko capability covering one Alchemy business surface.'
  tags:
  - Alchemy
  - Transfers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALCHEMY_API_KEY: ALCHEMY_API_KEY
capability:
  consumes:
  - type: http
    namespace: transfers-transfers
    baseUri: https://eth-mainnet.g.alchemy.com/v2/{apiKey}
    description: Alchemy Transfers API — Transfers business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: getassettransfers
        method: POST
        description: Alchemy Get Asset Transfers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Alchemy-Token
      value: '{{env.ALCHEMY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: transfers-transfers-rest
    port: 8080
    description: REST adapter for Alchemy Transfers API — Transfers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: getassettransfers
        description: Alchemy Get Asset Transfers
        call: transfers-transfers.getassettransfers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transfers-transfers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Alchemy Transfers API — Transfers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: alchemy-get-asset-transfers
      description: Alchemy Get Asset Transfers
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: transfers-transfers.getassettransfers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
