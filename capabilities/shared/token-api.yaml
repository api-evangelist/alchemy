naftiko: "1.0.0-alpha1"

info:
  label: "Alchemy Token API"
  description: >-
    The Alchemy Token API provides comprehensive access to ERC-20 token data
    across EVM-compatible networks. Retrieve token balances by wallet address,
    token metadata (name, symbol, decimals, logo), and real-time pricing data.
  tags:
    - Alchemy
    - Blockchain
    - Tokens
    - Web3
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALCHEMY_API_KEY: ALCHEMY_API_KEY

capability:
  consumes:
    - type: http
      namespace: token-api
      baseUri: https://eth-mainnet.g.alchemy.com/v2/{apiKey}
      description: "Alchemy Token API for ERC-20 token data."
      authentication:
        type: apikey
        key: X-Alchemy-Token
        value: "{{ALCHEMY_API_KEY}}"
        placement: header
      resources:
        - name: token-balances
          path: /getTokenBalances
          description: "ERC-20 token balances by wallet address."
          operations:
            - name: get-token-balances
              method: POST
              description: "Returns ERC-20 token balances for a specified wallet address."
              body:
                type: json
                data:
                  id: 1
                  jsonrpc: "2.0"
                  method: "alchemy_getTokenBalances"
                  params: "{{tools.params}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: token-metadata
          path: /getTokenMetadata
          description: "ERC-20 token metadata."
          operations:
            - name: get-token-metadata
              method: POST
              description: "Returns metadata for a given ERC-20 token contract address."
              body:
                type: json
                data:
                  id: 1
                  jsonrpc: "2.0"
                  method: "alchemy_getTokenMetadata"
                  params: "{{tools.params}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: token-api
      resources:
        - path: /v1/token-balances
          name: token-balances
          description: "ERC-20 token balances."
          operations:
            - method: POST
              name: get-token-balances
              description: "Get ERC-20 token balances for a wallet address."
              call: "token-api.get-token-balances"
              with:
                params: "rest.params"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/token-metadata
          name: token-metadata
          description: "ERC-20 token metadata."
          operations:
            - method: POST
              name: get-token-metadata
              description: "Get metadata for an ERC-20 token contract."
              call: "token-api.get-token-metadata"
              with:
                params: "rest.params"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: token-api-mcp
      transport: http
      tools:
        - name: get-token-balances
          description: "Get ERC-20 token balances for a wallet address across supported networks."
          hints:
            readOnly: true
            idempotent: true
          call: "token-api.get-token-balances"
          with:
            params: "tools.params"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-token-metadata
          description: "Get metadata (name, symbol, decimals, logo) for an ERC-20 token contract."
          hints:
            readOnly: true
            idempotent: true
          call: "token-api.get-token-metadata"
          with:
            params: "tools.params"
          outputParameters:
            - type: object
              mapping: "$."
