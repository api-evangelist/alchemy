naftiko: "1.0.0-alpha1"

info:
  label: "Alchemy Transfers API"
  description: >-
    The Alchemy Transfers API provides access to historical on-chain transfer
    data across EVM-compatible networks. Query asset transfers by address,
    block range, and transfer category (ETH, ERC-20, ERC-721, ERC-1155).
  tags:
    - Alchemy
    - Blockchain
    - Transfers
    - Web3
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALCHEMY_API_KEY: ALCHEMY_API_KEY

capability:
  consumes:
    - type: http
      namespace: transfers-api
      baseUri: https://eth-mainnet.g.alchemy.com/v2/{apiKey}
      description: "Alchemy Transfers API for historical on-chain transfer data."
      authentication:
        type: apikey
        key: X-Alchemy-Token
        value: "{{ALCHEMY_API_KEY}}"
        placement: header
      resources:
        - name: transfers
          path: /
          description: "Historical asset transfer data."
          operations:
            - name: get-asset-transfers
              method: POST
              description: "Returns asset transfers based on specified filters (ETH, ERC-20, ERC-721, ERC-1155)."
              body:
                type: json
                data:
                  id: 1
                  jsonrpc: "2.0"
                  method: "alchemy_getAssetTransfers"
                  params: "{{tools.params}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: transfers-api
      resources:
        - path: /v1/transfers
          name: transfers
          description: "On-chain asset transfers."
          operations:
            - method: POST
              name: get-asset-transfers
              description: "Query historical asset transfers by address, block range, and category."
              call: "transfers-api.get-asset-transfers"
              with:
                params: "rest.params"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: transfers-api-mcp
      transport: http
      tools:
        - name: get-asset-transfers
          description: "Query historical on-chain asset transfers by address, block range, and category (ETH, ERC-20, ERC-721, ERC-1155)."
          hints:
            readOnly: true
            idempotent: true
          call: "transfers-api.get-asset-transfers"
          with:
            params: "tools.params"
          outputParameters:
            - type: object
              mapping: "$."
