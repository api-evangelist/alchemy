specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Alchemy
providerId: alchemy
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- NFT
- Indexing
- Account Abstraction
- FinOps
- FOCUS
description: Alchemy bills as monthly subscription plus CU overages on paid plans,
  with separate metering for Data APIs and Smart Wallets / Bundler usage.
notes: Usage exports available via the Alchemy dashboard. No public usage API yet.
sources:
- https://www.alchemy.com/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Alchemy Insights, Inc.
serviceCategory: Web3
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Alchemy
  ServiceCategory: Web3
  ProviderName: Alchemy
  PublisherName: Alchemy
  InvoiceIssuerName: Alchemy
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: compute_units
  description: RPC compute units consumed per request, weighted per method.
  unit: CU
  aggregation: sum
  dimensions:
  - app
  - network
  - method
- name: data_api_requests
  description: NFT/Token/Transfers/Portfolio/Prices API requests.
  unit: request
  aggregation: sum
  dimensions:
  - app
  - api
- name: gas_sponsored
  description: Gas sponsored via the Gas Manager paymaster.
  unit: wei
  aggregation: sum
  dimensions:
  - policy
  - network
principles:
- name: Visibility
  description: Use the Alchemy dashboard usage tab and per-app CU breakdown to monitor
    spend.
- name: Allocation
  description: Tag apps per business unit; one app per environment to attribute CU.
- name: Optimization
  description: Use eth_call batching, archive sparingly, prefer subscriptions over
    polling, set Compute Budgets.
- name: Accountability
  description: Assign app owners; review monthly CU burn against budget.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
