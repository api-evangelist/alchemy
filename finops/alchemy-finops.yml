description: 'FOCUS-aligned FinOps for Alchemy: Compute-Unit-based metered usage with a free quota, tiered
  per-1M-CU pricing on Pay-as-you-go ($0.45/1M up to 300M, $0.40/1M after), and custom-quoted Enterprise
  with volume discounts. Throughput is provisioned in CU/s and RPS.'
sources:
  - https://www.alchemy.com/pricing
  - https://www.alchemy.com/docs/reference/throughput
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Pay-As-You-Go + Tiered + Custom Enterprise
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Alchemy
  ServiceCategory: Web3 / Blockchain Infrastructure
  ProviderName: Alchemy
  PublisherName: Alchemy Insights, Inc.
  InvoiceIssuerName: Alchemy Insights, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: 1M Compute Units
meters:
  - name: compute_units
    description: Compute Units consumed across all Alchemy APIs
    unit: compute-unit
    aggregation: sum
    dimensions:
      - chain
      - method
      - app
      - environment
  - name: requests
    description: Raw API requests (averages ~27 CUs per request)
    unit: request
    aggregation: sum
    dimensions:
      - chain
      - method
      - app
  - name: throughput_addons
    description: Purchased CU/s throughput add-ons beyond the plan's included throughput
    unit: CU/s-month
    aggregation: max
    dimensions:
      - app
  - name: apps
    description: Configured Alchemy apps in the account
    unit: app
    aggregation: max
    dimensions:
      - chain
  - name: webhooks
    description: Configured webhooks
    unit: webhook
    aggregation: max
    dimensions:
      - app
principles:
  - name: Visibility
    description: Use the Alchemy dashboard's compute-unit, request-volume, and throughput-utilization views
      per app to see consumption in near-real-time. Export usage via the Alchemy account API for ingestion
      into FOCUS-formatted billing pipelines.
  - name: Allocation
    description: Allocate cost by app and team using Alchemy's per-app reporting; tag environments (dev/staging/prod)
      via separate apps to keep prod CU spend isolated.
  - name: Optimization
    description: Reduce CU spend by batching JSON-RPC calls, caching read-heavy methods, choosing CU-cheaper
      methods (e.g. eth_getLogs over alchemy_getAssetTransfers when applicable), and using free-tier mainnets
      for prototyping. Consider Pay-as-you-go's $0.40/1M CU tier kicking in after 300M CUs.
  - name: Accountability
    description: Assign budget owners per app; configure usage alerts in the Alchemy dashboard; review
      CU and throughput trends monthly against feature roadmap and on-chain volume.
maintainers:
